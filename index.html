<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GhostTheConqueror</title>

    <meta name="description" content="The Beginning">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main class="landing">

        <!-- HERO -->
        <section class="hero reveal reveal-1">

            <img
                src="assets/images/logo/logo.png"
                alt="GhostTheConqueror Logo"
                class="logo">

            <h1>GHOSTTHECONQUEROR</h1>

            <p class="subtitle">
                THE BEGINNING
            </p>

        </section>

        <!-- STATUS -->
        <section class="status reveal reveal-2">

            <p class="status-label">
                STATUS
            </p>

            <h2>
                INITIALIZATION
            </h2>

            <div
                id="status-progress"
                class="status-progress">
                0.000000%
            </div>

        </section>

        <!-- COUNTDOWN -->
        <section class="countdown reveal reveal-3">

            <div id="countdown">

                <div class="time-box">
                    <span id="days">000</span>
                    <label>DAYS</label>
                </div>

                <div class="time-box">
                    <span id="hours">00</span>
                    <label>HOURS</label>
                </div>

                <div class="time-box">
                    <span id="minutes">00</span>
                    <label>MINUTES</label>
                </div>

                <div class="time-box">
                    <span id="seconds">00</span>
                    <label>SECONDS</label>
                </div>

            </div>

        </section>

        <!-- SYSTEM LOG -->
        <section class="terminal reveal reveal-4">

            <h3>SYSTEM LOG</h3>

            <div class="terminal-window">

                <div>[2026.07.07] Initialization protocol started.</div>

                <div>[2026.07.09] Visual systems online.</div>

                <div>[2026.07.15] Signal transmission begins.</div>

                <div>[??????????] Access denied.</div>

            </div>

        </section>

     

    </main>

    <script src="js/config.js"></script>
    <script src="js/script.js"></script>

</body>

</html>
